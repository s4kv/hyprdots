[config.wallpaper]
command = 'awww img --transition-type center "{{ image }}"'
set = true

[templates.hyprland_lua]
input_path = '~/.config/matugen/templates/hyprland-colors.lua'
output_path = '~/.config/hypr/conf/colors.lua'

[templates.hyprlock]
input_path = '~/.config/matugen/templates/hyprlock-colors.conf'
output_path = '~/.config/hypr/conf/colors.conf'
post_hook = 'hyprctl reload >/dev/null 2>&1 || true'

[templates.waybar]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/waybar/colors.css'
post_hook = '$HOME/.config/hypr/scripts/restart-waybar.sh'

[templates.rofi]
input_path = '~/.config/matugen/templates/rofi-colors.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.kitty]
input_path = '~/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/colors.conf'

[templates.qt5ct]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt5ct/colors/matugen.conf'

[templates.qt6ct]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'

[templates.yazi]
input_path = '~/.config/matugen/templates/yazi-theme.toml'
output_path = '~/.config/yazi/theme.toml'

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.mako]
input_path = '~/.config/matugen/templates/mako-colors'
output_path = '~/.config/mako/config'
post_hook = 'makoctl reload >/dev/null 2>&1 || true'

[templates.zathura]
input_path = '~/.config/matugen/templates/zathura-colors'
output_path = '~/.config/zathura/zathurarc'

[templates.wallpaper]
input_path = '~/.config/matugen/templates/boot-wall.sh'
output_path = '~/.config/hypr/boot-wall.sh'
post_hook = 'chmod +x ~/.config/hypr/boot-wall.sh'

[templates.quickshell_overview]
input_path = '~/.config/matugen/templates/quickshell-overview.qml'
output_path = '~/.config/quickshell/overview/common/Appearance.colors.qml'

[templates.hamr_colors]
input_path = '~/.config/matugen/templates/hamr-colors.json'
output_path = '~/.config/hamr/colors.json'
